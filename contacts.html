<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>OpenBrain - Contacts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Nav */
        .nav {
            display: flex;
            background: #0f172a;
            border-bottom: 1px solid #334155;
            overflow-x: auto;
        }
        .nav a {
            padding: 10px 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .nav a:hover { color: #94a3b8; }
        .nav a.active { color: #6366f1; border-bottom-color: #6366f1; }

        /* Header */
        .header {
            background: #1e293b;
            padding: 16px 20px 12px;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .header h1 { font-size: 20px; font-weight: 700; color: #f8fafc; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .btn-icon {
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: #475569; color: #e2e8f0; }
        .btn-add {
            background: #4f46e5;
            border: 1px solid #6366f1;
            color: #fff;
            padding: 0 14px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .btn-add:hover { background: #4338ca; }
        .search-row { display: flex; gap: 8px; }
        .search-bar {
            flex: 1;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
        }
        .search-bar:focus { border-color: #6366f1; }
        .search-bar::placeholder { color: #64748b; }
        .filter-select {
            padding: 10px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #94a3b8;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            overflow-x: auto;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        .stat-chip {
            flex-shrink: 0;
            padding: 8px 14px;
            background: #334155;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
        }
        .stat-value { font-size: 20px; font-weight: 700; color: #f8fafc; }
        .stat-label { color: #64748b; margin-top: 2px; }

        /* Content */
        .content { padding: 16px 20px 80px; }

        /* Cards */
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #6366f1; }
        .card.overdue { border-left: 3px solid #ef4444; }
        .card.warning { border-left: 3px solid #f59e0b; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }
        .card-name { font-size: 16px; font-weight: 600; color: #f8fafc; flex: 1; }
        .badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .badge-high { background: #7f1d1d; color: #fca5a5; }
        .badge-medium { background: #78350f; color: #fcd34d; }
        .badge-low { background: #1e3a5f; color: #93c5fd; }
        .card-org { font-size: 13px; color: #6366f1; margin-bottom: 6px; }
        .card-context { font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
        .card-notes { font-size: 13px; color: #64748b; line-height: 1.4; margin-bottom: 8px; }
        .card-touch {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
        }
        .card-touch.overdue { color: #ef4444; }
        .card-touch.warning { color: #f59e0b; }
        .card-touch.ok { color: #22c55e; }
        .card-touch.none { color: #475569; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #334155;
        }
        .card-actions { display: flex; gap: 6px; }
        .btn-sm {
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-sm:hover { background: #475569; color: #e2e8f0; }
        .btn-sm.delete:hover { background: #7f1d1d; color: #fca5a5; border-color: #991b1b; }
        .btn-sm.touch { background: #065f46; border-color: #059669; color: #6ee7b7; }
        .btn-sm.touch:hover { background: #047857; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 { font-size: 18px; color: #f8fafc; margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .form-input:focus { border-color: #6366f1; }
        textarea.form-input { resize: vertical; min-height: 60px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-cancel {
            padding: 10px 20px;
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-save {
            padding: 10px 20px;
            background: #4f46e5;
            border: 1px solid #6366f1;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn-save:hover { background: #4338ca; }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #475569;
            z-index: 10;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.offline { background: #ef4444; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #065f46;
            color: #6ee7b7;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 200;
            display: none;
            animation: fadeIn 0.2s;
        }
        .toast.error { background: #7f1d1d; color: #fca5a5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }

        .empty-state { text-align: center; padding: 60px 20px; color: #475569; font-size: 15px; }
        .loading { text-align: center; padding: 60px 20px; color: #6366f1; font-size: 15px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="./">Products</a>
        <a href="contacts.html" class="active">Contacts</a>
        <a href="knowledge.html">Knowledge</a>
    </div>
    <div class="header">
        <div class="header-top">
            <h1>Contacts</h1>
            <div class="header-actions">
                <button class="btn-icon" id="exportBtn" title="Export CSV">&#8681;</button>
                <button class="btn-icon" id="refreshBtn" title="Refresh">&#8635;</button>
                <button class="btn-add" id="addBtn">+ New</button>
            </div>
        </div>
        <div class="search-row">
            <input type="text" class="search-bar" id="search" placeholder="Search by name, org, or notes...">
            <select class="filter-select" id="priorityFilter">
                <option value="">All Priority</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
            <select class="filter-select" id="orgFilter">
                <option value="">All Orgs</option>
            </select>
        </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="content" id="content">
        <div class="loading">Loading contacts...</div>
    </div>

    <div class="status-bar">
        <span><span class="status-dot" id="statusDot"></span><span id="statusText">Connected</span></span>
        <span id="lastRefresh"></span>
    </div>
    <div class="toast" id="toast"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">New Contact</h2>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Name</label>
                <input type="text" class="form-input" id="fName" placeholder="Full name">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Organization</label>
                    <input type="text" class="form-input" id="fOrg" placeholder="Company / project">
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select class="form-input" id="fPriority">
                        <option value="">Select...</option>
                        <option>High</option><option>Medium</option><option>Low</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Context</label>
                <input type="text" class="form-input" id="fContext" placeholder="Role, relationship, how you know them">
            </div>
            <div class="form-group">
                <label>Last Touch</label>
                <input type="date" class="form-input" id="fLastTouch">
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea class="form-input" id="fNotes" placeholder="Last conversation context, follow-up needed..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelBtn">Cancel</button>
                <button class="btn-save" id="saveBtn">Save</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jliupjtnvloyzdvtnvws.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsaXVwanRudmxveXpkdnRudndzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTk5NjMsImV4cCI6MjA5MDI5NTk2M30.ehFTcnolHS87eCzO5BFKnXqp9400l_-f7erE9Ux6Gi8';
        const HEADERS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

        let allContacts = [];

        // --- API ---
        async function apiGet() {
            const res = await fetch(SUPABASE_URL + '/rest/v1/contacts?select=*', { headers: HEADERS });
            if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
            return res.json();
        }
        async function apiInsert(contact) {
            const res = await fetch(SUPABASE_URL + '/rest/v1/contacts', { method: 'POST', headers: HEADERS, body: JSON.stringify(contact) });
            if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
            return res.json();
        }
        async function apiUpdate(id, contact) {
            const res = await fetch(SUPABASE_URL + '/rest/v1/contacts?id=eq.' + id, { method: 'PATCH', headers: HEADERS, body: JSON.stringify({ ...contact, updated_at: new Date().toISOString() }) });
            if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
            return res.json();
        }
        async function apiDelete(id) {
            const res = await fetch(SUPABASE_URL + '/rest/v1/contacts?id=eq.' + id, { method: 'DELETE', headers: HEADERS });
            if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        }

        // --- Days calculation ---
        function daysSince(dateStr) {
            if (!dateStr) return null;
            const diff = Date.now() - new Date(dateStr).getTime();
            return Math.floor(diff / 86400000);
        }

        function touchClass(days) {
            if (days === null) return 'none';
            if (days >= 30) return 'overdue';
            if (days >= 14) return 'warning';
            return 'ok';
        }

        function touchLabel(days) {
            if (days === null) return 'No contact logged';
            if (days === 0) return 'Today';
            if (days === 1) return '1 day ago';
            return days + ' days ago';
        }

        // --- Load & Render ---
        async function loadContacts() {
            try {
                allContacts = await apiGet();
                updateStatus(true);
                populateOrgFilter();
                applyFiltersAndRender();
            } catch (e) {
                document.getElementById('content').innerHTML = '<div class="empty-state">Could not connect to database</div>';
                updateStatus(false);
            }
        }

        function populateOrgFilter() {
            const orgs = [...new Set(allContacts.map(c => c.org).filter(Boolean))].sort();
            const sel = document.getElementById('orgFilter');
            const current = sel.value;
            sel.innerHTML = '<option value="">All Orgs</option>' + orgs.map(o => `<option>${esc(o)}</option>`).join('');
            sel.value = current;
        }

        function applyFiltersAndRender() {
            const q = document.getElementById('search').value.toLowerCase();
            const priority = document.getElementById('priorityFilter').value;
            const org = document.getElementById('orgFilter').value;
            let filtered = allContacts;
            if (q) filtered = filtered.filter(c =>
                (c.name||'').toLowerCase().includes(q) ||
                (c.org||'').toLowerCase().includes(q) ||
                (c.notes||'').toLowerCase().includes(q)
            );
            if (priority) filtered = filtered.filter(c => c.priority === priority);
            if (org) filtered = filtered.filter(c => c.org === org);
            // Sort by days since last contact (longest first)
            filtered.sort((a, b) => {
                const da = daysSince(a.last_touch);
                const db = daysSince(b.last_touch);
                if (da === null && db === null) return 0;
                if (da === null) return -1;
                if (db === null) return -1;
                return db - da;
            });
            renderStats(filtered);
            renderCards(filtered);
        }

        function renderStats(contacts) {
            const el = document.getElementById('stats');
            const total = contacts.length;
            const overdue = contacts.filter(c => daysSince(c.last_touch) >= 30).length;
            const warning = contacts.filter(c => { const d = daysSince(c.last_touch); return d !== null && d >= 14 && d < 30; }).length;
            const high = contacts.filter(c => c.priority === 'High').length;
            el.innerHTML = `
                <div class="stat-chip"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
                <div class="stat-chip"><div class="stat-value" style="color:#ef4444">${overdue}</div><div class="stat-label">30d+ overdue</div></div>
                <div class="stat-chip"><div class="stat-value" style="color:#f59e0b">${warning}</div><div class="stat-label">14d+ stale</div></div>
                <div class="stat-chip"><div class="stat-value" style="color:#6366f1">${high}</div><div class="stat-label">High priority</div></div>
            `;
        }

        function renderCards(contacts) {
            const content = document.getElementById('content');
            if (!contacts.length) {
                content.innerHTML = '<div class="empty-state">No contacts found. Add your first contact with the + New button.</div>';
                return;
            }
            content.innerHTML = contacts.map(c => {
                const days = daysSince(c.last_touch);
                const tc = touchClass(days);
                const cardClass = tc === 'overdue' ? ' overdue' : tc === 'warning' ? ' warning' : '';
                const priorityClass = 'badge-' + (c.priority||'').toLowerCase();
                return `<div class="card${cardClass}">
                    <div class="card-header">
                        <div class="card-name">${esc(c.name||'Unknown')}</div>
                        ${c.priority ? `<span class="badge ${priorityClass}">${esc(c.priority)}</span>` : ''}
                    </div>
                    ${c.org ? `<div class="card-org">${esc(c.org)}</div>` : ''}
                    ${c.context ? `<div class="card-context">${esc(c.context)}</div>` : ''}
                    ${c.notes ? `<div class="card-notes">${esc(c.notes)}</div>` : ''}
                    <div class="card-touch ${tc}">${touchLabel(days)}</div>
                    <div class="card-footer">
                        <div class="card-actions">
                            <button class="btn-sm touch" onclick="markTouch('${c.id}')">Log Touch</button>
                            <button class="btn-sm" onclick="openEdit('${c.id}')">Edit</button>
                            <button class="btn-sm delete" onclick="deleteContact('${c.id}','${esc(c.name)}')">Delete</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // --- Modal ---
        function openModal(title) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalOverlay').classList.add('show');
        }
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            ['editId','fName','fOrg','fContext','fLastTouch','fNotes'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('fPriority').selectedIndex = 0;
        }
        function openEdit(id) {
            const c = allContacts.find(x => x.id === id);
            if (!c) return;
            document.getElementById('editId').value = id;
            document.getElementById('fName').value = c.name || '';
            document.getElementById('fOrg').value = c.org || '';
            document.getElementById('fPriority').value = c.priority || '';
            document.getElementById('fContext').value = c.context || '';
            document.getElementById('fLastTouch').value = c.last_touch || '';
            document.getElementById('fNotes').value = c.notes || '';
            openModal('Edit Contact');
        }

        async function saveContact() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('fName').value.trim(),
                org: document.getElementById('fOrg').value.trim(),
                priority: document.getElementById('fPriority').value,
                context: document.getElementById('fContext').value.trim(),
                last_touch: document.getElementById('fLastTouch').value || null,
                notes: document.getElementById('fNotes').value.trim()
            };
            if (!data.name) { showToast('Name is required', true); return; }
            try {
                if (id) { await apiUpdate(id, data); showToast('Contact updated'); }
                else { await apiInsert(data); showToast('Contact added'); }
                closeModal();
                await loadContacts();
            } catch (e) { showToast('Error: ' + e.message, true); }
        }

        async function markTouch(id) {
            try {
                await apiUpdate(id, { last_touch: new Date().toISOString().slice(0, 10) });
                showToast('Touch logged');
                await loadContacts();
            } catch (e) { showToast('Error: ' + e.message, true); }
        }

        async function deleteContact(id, name) {
            if (!confirm('Delete "' + name + '"?')) return;
            try {
                await apiDelete(id);
                showToast('Contact deleted');
                await loadContacts();
            } catch (e) { showToast('Error: ' + e.message, true); }
        }

        // --- CSV Export ---
        function exportCSV() {
            if (!allContacts.length) { showToast('No data to export', true); return; }
            const cols = ['name','org','context','last_touch','notes','priority','updated_at'];
            const header = cols.join(',');
            const rows = allContacts.map(c => cols.map(col => {
                let v = c[col] != null ? String(c[col]) : '';
                if (v.includes(',') || v.includes('"') || v.includes('\n')) v = '"' + v.replace(/"/g, '""') + '"';
                return v;
            }).join(','));
            const csv = [header, ...rows].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'contacts_' + new Date().toISOString().slice(0,10) + '.csv';
            a.click();
            URL.revokeObjectURL(url);
            showToast('CSV exported');
        }

        // --- Utilities ---
        function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (isError ? ' error' : '');
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        function updateStatus(online) {
            document.getElementById('statusDot').className = 'status-dot' + (online ? '' : ' offline');
            document.getElementById('statusText').textContent = online ? 'Connected' : 'Disconnected';
            document.getElementById('lastRefresh').textContent = 'Refreshed ' + new Date().toLocaleTimeString();
        }

        // --- Events ---
        document.getElementById('search').addEventListener('input', applyFiltersAndRender);
        document.getElementById('priorityFilter').addEventListener('change', applyFiltersAndRender);
        document.getElementById('orgFilter').addEventListener('change', applyFiltersAndRender);
        document.getElementById('addBtn').addEventListener('click', () => { document.getElementById('editId').value = ''; openModal('New Contact'); });
        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        document.getElementById('saveBtn').addEventListener('click', saveContact);
        document.getElementById('refreshBtn').addEventListener('click', loadContacts);
        document.getElementById('exportBtn').addEventListener('click', exportCSV);
        document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

        window.addEventListener('offline', () => updateStatus(false));
        window.addEventListener('online', () => loadContacts());

        setInterval(loadContacts, 30000);
        loadContacts();
    </script>
</body>
</html>
