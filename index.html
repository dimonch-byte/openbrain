<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBrain - Product Pipeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: #1e293b;
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 12px;
        }
        .search-bar {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
        }
        .search-bar:focus { border-color: #6366f1; }
        .search-bar::placeholder { color: #64748b; }
        .summary {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            overflow-x: auto;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        .summary-chip {
            flex-shrink: 0;
            padding: 6px 12px;
            background: #334155;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
        }
        .summary-chip .count {
            color: #6366f1;
            margin-left: 4px;
        }
        .content { padding: 16px 20px 80px; }
        .stage-group { margin-bottom: 24px; }
        .stage-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6366f1;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #1e293b;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #6366f1; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .card-name {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            flex: 1;
        }
        .badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .badge-active { background: #065f46; color: #6ee7b7; }
        .badge-paused { background: #78350f; color: #fcd34d; }
        .badge-blocked { background: #7f1d1d; color: #fca5a5; }
        .badge-complete { background: #1e3a5f; color: #93c5fd; }
        .card-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .card-meta span { display: flex; align-items: center; gap: 4px; }
        .card-notes {
            font-size: 13px;
            color: #64748b;
            line-height: 1.4;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
            font-size: 15px;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6366f1;
            font-size: 15px;
        }
        .error-banner {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 12px 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Product Pipeline</h1>
        <input type="text" class="search-bar" id="search" placeholder="Search by name or category...">
    </div>
    <div class="summary" id="summary"></div>
    <div class="error-banner" id="error"></div>
    <div class="content" id="content">
        <div class="loading">Loading products...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jliupjtnvloyzdvtnvws.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsaXVwanRudmxveXpkdnRudndzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTk5NjMsImV4cCI6MjA5MDI5NTk2M30.ehFTcnolHS87eCzO5BFKnXqp9400l_-f7erE9Ux6Gi8';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const STAGES = ['D1','D2','D3','D4','D5','D6','D7','D8','D9','D10'];
        let allProducts = [];

        async function loadProducts() {
            const { data, error } = await supabase
                .from('products')
                .select('*')
                .order('stage', { ascending: true });

            if (error) {
                document.getElementById('error').textContent = 'Failed to load: ' + error.message;
                document.getElementById('error').style.display = 'block';
                document.getElementById('content').innerHTML = '<div class="empty-state">Could not connect to database</div>';
                return;
            }

            allProducts = data || [];
            render(allProducts);
        }

        function render(products) {
            const content = document.getElementById('content');
            const summary = document.getElementById('summary');

            // Summary chips
            const stageCounts = {};
            products.forEach(p => {
                const s = p.stage || 'Unknown';
                stageCounts[s] = (stageCounts[s] || 0) + 1;
            });
            summary.innerHTML = STAGES
                .filter(s => stageCounts[s])
                .map(s => `<div class="summary-chip">${s}<span class="count">${stageCounts[s]}</span></div>`)
                .join('') || '<div class="summary-chip">No products</div>';

            // Group by stage
            const grouped = {};
            products.forEach(p => {
                const s = p.stage || 'Unknown';
                if (!grouped[s]) grouped[s] = [];
                grouped[s].push(p);
            });

            const stageOrder = STAGES.concat(Object.keys(grouped).filter(s => !STAGES.includes(s)));
            let html = '';

            stageOrder.forEach(stage => {
                if (!grouped[stage]) return;
                html += `<div class="stage-group">
                    <div class="stage-title">${stage} — ${grouped[stage].length} product${grouped[stage].length > 1 ? 's' : ''}</div>`;
                grouped[stage].forEach(p => {
                    const statusClass = (p.status || '').toLowerCase();
                    const badgeClass = `badge-${statusClass}`;
                    const price = p.price_cad != null ? `$${Number(p.price_cad).toFixed(0)} CAD` : 'TBD';
                    html += `<div class="card">
                        <div class="card-header">
                            <div class="card-name">${esc(p.name || 'Untitled')}</div>
                            <span class="badge ${badgeClass}">${esc(p.status || 'Unknown')}</span>
                        </div>
                        <div class="card-meta">
                            <span>${esc(p.platform || '—')}</span>
                            <span>${price}</span>
                            <span>${esc(p.category || '—')}</span>
                        </div>
                        ${p.notes ? `<div class="card-notes">${esc(p.notes)}</div>` : ''}
                    </div>`;
                });
                html += '</div>';
            });

            content.innerHTML = html || '<div class="empty-state">No products found</div>';
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if (!q) return render(allProducts);
            render(allProducts.filter(p =>
                (p.name || '').toLowerCase().includes(q) ||
                (p.category || '').toLowerCase().includes(q)
            ));
        });

        loadProducts();
    </script>
</body>
</html>
